services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum
      POSTGRES_DB: momentum
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momentum"]
      interval: 5s
      retries: 10
volumes:
  pgdata:
